<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Ctext x='50' y='72' font-size='52' text-anchor='middle' fill='%234f46e5' font-family='Arial'%3E🎶%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Ctext x='50' y='72' font-size='52' text-anchor='middle' fill='%234f46e5' font-family='Arial'%3E🎶%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Late Fees | University of Embu Choir</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1 i {
            color: #4f46e5;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
        }

        .kpi-card {
            background: #f8fafc;
            padding: 16px 14px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            transition: background 0.15s;
        }

        .kpi-card .number {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
            word-break: break-word;
        }

        .kpi-card .label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .kpi-card .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-success { background: #d1fae5; color: #065f46; }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity .15s, transform .1s;
            white-space: nowrap;
        }

        .btn:hover { opacity: .85; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-amber { background: #f59e0b; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #dc2626; color: white; }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: #0f172a;
        }

        .btn-outline.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .btn-outline.active:hover {
            background: #4338ca;
            border-color: #4338ca;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            font-size: 13px;
        }

        th {
            background: #f8fafc;
            padding: 12px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        .status-badge {
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-late { background: #fee2e2; color: #991b1b; }

        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .container { padding: 18px 14px; }
            .header h1 { font-size: 20px; }
            .btn { font-size: 12px; padding: 8px 14px; }
        }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .container { padding: 14px 10px; border-radius: 20px; }
            .header { flex-direction: column; align-items: stretch; gap: 10px; }
            .header h1 { font-size: 18px; justify-content: center; }
            .header-actions { justify-content: center; }
            .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .kpi-card { padding: 12px 10px; }
            .kpi-card .number { font-size: 22px; }
            .controls { justify-content: center; }
            .controls .btn { flex: 1 1 auto; justify-content: center; font-size: 12px; padding: 8px 12px; }
            .table-wrapper { border-radius: 12px; }
            table { min-width: 600px; font-size: 12px; }
            th, td { padding: 10px 8px; }
            .status-badge { font-size: 10px; padding: 2px 10px; }
            .back-link { font-size: 13px; margin-bottom: 10px; }
            .btn-amber, .btn-primary { width: 100%; justify-content: center; }
            .header-actions .btn { width: 100%; justify-content: center; }
            .kpi-card .badge { font-size: 10px; padding: 1px 8px; }
        }

        @media (max-width: 420px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .kpi-card { padding: 10px 8px; }
            .kpi-card .number { font-size: 20px; }
            .container { padding: 10px 6px; }
            .btn { font-size: 11px; padding: 6px 10px; }
            th, td { padding: 8px 6px; font-size: 11px; }
            table { min-width: 480px; }
        }

        .kpi-card .label { word-break: break-word; }
        .btn i { font-size: 13px; }

        @media (max-width: 480px) {
            .btn i { font-size: 12px; }
        }

        /* Loading shimmer effect */
        .loading-shimmer {
            animation: shimmer 1.5s ease-in-out infinite;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="reportContainer">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

        <div class="header">
            <h1><i class="fas fa-clock"></i> Late Fee Management</h1>
            <div class="header-actions">
                <button class="btn btn-amber" onclick="calculateLateFees()">
                    <i class="fas fa-calculator"></i> Calculate
                </button>
                <button class="btn btn-primary" onclick="loadLateFees()">
                    <i class="fas fa-refresh"></i> Refresh
                </button>
            </div>
        </div>

        <div class="kpi-grid" id="kpiGrid">
            <div class="kpi-card">
                <div class="number" id="totalPending">0</div>
                <div class="label">Pending Penalties</div>
            </div>
            <div class="kpi-card">
                <div class="number" id="totalLateFees">KSh 0</div>
                <div class="label">Total Late Fees</div>
                <span class="badge badge-warning">Pending</span>
            </div>
            <div class="kpi-card">
                <div class="number" id="avgLateDays">0</div>
                <div class="label">Avg Days Late</div>
                <span class="badge badge-danger">Overdue</span>
            </div>
            <div class="kpi-card">
                <div class="number" id="totalWithFees">KSh 0</div>
                <div class="label">Total Due (with fees)</div>
                <span class="badge badge-success">Total Due</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="updateAllLateFees()">
                <i class="fas fa-sync"></i> Update All
            </button>
            <button class="btn btn-amber" onclick="exportCSV()">
                <i class="fas fa-file-csv"></i> CSV
            </button>
            <button class="btn btn-red" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> PDF
            </button>

            <button class="btn btn-outline active" id="filterAll" onclick="setFilter('all')">
                <i class="fas fa-list"></i> All
            </button>
            <button class="btn btn-outline" id="filterPending" onclick="setFilter('pending')">
                <i class="fas fa-clock"></i> Pending Only
            </button>
            <button class="btn btn-outline" id="filterPaid" onclick="setFilter('paid')">
                <i class="fas fa-check-circle"></i> Paid Only
            </button>
        </div>

        <div class="table-wrapper">
            <table id="penaltiesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Member</th>
                        <th>Voice</th>
                        <th>Type</th>
                        <th>Original</th>
                        <th>Days Late</th>
                        <th>Late Fee</th>
                        <th>Total Due</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="penaltiesList">
                    <tr>
                        <td colspan="9" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading penalties...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://skrvassehezrynudbahn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrcnZhc3NlaGV6cnludWRiYWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzAsImV4cCI6MjA5MjExMTIzMH0.iA93tmu9TCdmEhUxBLGRUE0fRdDha9-WPps8qNzd5a0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentFilter = 'all';
        let allPenalties = [];

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // ── SET FILTER ──
        function setFilter(filter) {
            currentFilter = filter;

            document.querySelectorAll('.controls .btn-outline').forEach(btn => {
                btn.classList.remove('active');
            });

            if (filter === 'all') {
                document.getElementById('filterAll').classList.add('active');
            } else if (filter === 'pending') {
                document.getElementById('filterPending').classList.add('active');
            } else if (filter === 'paid') {
                document.getElementById('filterPaid').classList.add('active');
            }

            renderPenalties();
        }

        // ── RENDER PENALTIES ──
        function renderPenalties() {
            const tbody = document.getElementById('penaltiesList');

            let filtered = allPenalties;

            if (currentFilter === 'pending') {
                filtered = allPenalties.filter(p => p.status === 'pending');
            } else if (currentFilter === 'paid') {
                filtered = allPenalties.filter(p => p.status === 'paid');
            }

            if (!filtered || filtered.length === 0) {
                const msg = currentFilter === 'all' ? 'No penalties found!' :
                    currentFilter === 'pending' ? 'No pending penalties!' :
                    'No paid penalties!';
                tbody.innerHTML =
                    `<tr><td colspan="9" class="empty-state"><i class="fas fa-check-circle"></i> ${msg}</td></tr>`;
                return;
            }

            let totalPending = 0;
            let totalLateFees = 0;
            let totalWithFees = 0;
            let totalDaysLate = 0;
            let countWithLate = 0;

            const html = filtered.map((p, index) => {
                const isPending = p.status === 'pending';
                const originalAmount = p.original_amount || p.amount || 0;
                const lateFee = p.late_fee_amount || 0;
                const totalAmount = p.total_with_late_fee || originalAmount + lateFee;
                const daysLate = p.late_fee_days || 0;

                if (isPending) {
                    totalPending++;
                    totalLateFees += lateFee;
                    totalWithFees += totalAmount;
                    if (daysLate > 0) {
                        totalDaysLate += daysLate;
                        countWithLate++;
                    }
                }

                const isLate = isPending && daysLate > 0;

                const statusClass = p.status === 'paid' ? 'status-paid' :
                    isLate ? 'status-late' : 'status-pending';
                const statusLabel = p.status === 'paid' ? 'Paid' :
                    isLate ? '⚠️ Late' : 'Pending';

                const typeLabel = p.penalty_type === 'late' ? '⏰ Late' : 
                                  p.penalty_type === 'custom' ? '📌 Custom' : '❌ Absent';

                // Show custom reason if available
                let customReason = '';
                if (p.is_custom && p.custom_reason) {
                    customReason = `<div style="font-size:10px; color:#92400e; margin-top:2px;">📝 ${escapeHtml(p.custom_reason)}</div>`;
                }

                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>
                            <strong>${escapeHtml(p.members?.name || p.member_name || 'Unknown Member')}</strong>
                            ${customReason}
                        </td>
                        <td>${escapeHtml(p.members?.voice_part || p.voice_part || '—')}</td>
                        <td>${typeLabel}</td>
                        <td>KSh ${originalAmount.toFixed(2)}</td>
                        <td>${daysLate > 0 ? `${daysLate} days` : '—'}</td>
                        <td style="color:${lateFee > 0 ? '#dc2626' : '#64748b'}; font-weight:${lateFee > 0 ? '700' : '400'};">
                            ${lateFee > 0 ? `+KSh ${lateFee.toFixed(2)}` : '—'}
                        </td>
                        <td style="font-weight:700; color:${isPending ? '#dc2626' : '#10b981'};">
                            KSh ${totalAmount.toFixed(2)}
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
                    </tr>
                `;
            }).join('');

            tbody.innerHTML = html;

            document.getElementById('totalPending').textContent = totalPending;
            document.getElementById('totalLateFees').textContent = `KSh ${totalLateFees.toFixed(2)}`;
            document.getElementById('totalWithFees').textContent = `KSh ${totalWithFees.toFixed(2)}`;
            document.getElementById('avgLateDays').textContent = countWithLate > 0 ?
                (totalDaysLate / countWithLate).toFixed(1) : 0;
        }

        // ── LOAD LATE FEES (FIXED - HANDLES MISSING MEMBERS) ──
        async function loadLateFees() {
            const tbody = document.getElementById('penaltiesList');
            tbody.innerHTML =
                '<tr><td colspan="9" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading penalties...</td></tr>';

            try {
                // ✅ Step 1: Get ALL penalties first (no join)
                const { data: penalties, error } = await supabaseClient
                    .from('penalties')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!penalties || penalties.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="9" class="empty-state"><i class="fas fa-inbox"></i> No penalties found in the database.</td></tr>`;
                    allPenalties = [];
                    renderPenalties();
                    return;
                }

                console.log(`✅ Loaded ${penalties.length} penalties from database`);

                // ✅ Step 2: Get member names for all unique member_ids
                const memberIds = [...new Set(penalties.map(p => p.member_id).filter(id => id))];
                let memberMap = {};

                if (memberIds.length > 0) {
                    const { data: members, error: memberError } = await supabaseClient
                        .from('members')
                        .select('member_id, name, voice_part')
                        .in('member_id', memberIds);

                    if (!memberError && members) {
                        memberMap = members.reduce((acc, m) => {
                            acc[m.member_id] = m;
                            return acc;
                        }, {});
                        console.log(`✅ Found ${Object.keys(memberMap).length} members`);
                    } else {
                        console.warn('⚠️ Could not fetch members:', memberError);
                    }
                }

                // ✅ Step 3: Build penalties with member info
                allPenalties = penalties.map(p => {
                    const member = memberMap[p.member_id];
                    return {
                        ...p,
                        members: member || null,
                        member_name: member ? member.name : `Member (${p.member_id || 'Unknown'})`,
                        voice_part: member ? member.voice_part : '—'
                    };
                });

                console.log(`✅ Processed ${allPenalties.length} penalties with member info`);

                // ✅ Step 4: Update KPI cards with totals
                const pendingPenalties = allPenalties.filter(p => p.status === 'pending');
                const totalPending = pendingPenalties.length;
                const totalLateFeesSum = pendingPenalties.reduce((s, p) => s + (p.late_fee_amount || 0), 0);
                const totalDueSum = pendingPenalties.reduce((s, p) => s + (p.total_with_late_fee || p.amount || 0), 0);
                
                let totalDaysLate = 0;
                let countWithLate = 0;
                pendingPenalties.forEach(p => {
                    if (p.late_fee_days > 0) {
                        totalDaysLate += p.late_fee_days;
                        countWithLate++;
                    }
                });

                document.getElementById('totalPending').textContent = totalPending;
                document.getElementById('totalLateFees').textContent = `KSh ${totalLateFeesSum.toFixed(2)}`;
                document.getElementById('totalWithFees').textContent = `KSh ${totalDueSum.toFixed(2)}`;
                document.getElementById('avgLateDays').textContent = countWithLate > 0 ?
                    (totalDaysLate / countWithLate).toFixed(1) : 0;

                renderPenalties();

            } catch (error) {
                console.error('❌ Error loading penalties:', error);
                tbody.innerHTML =
                    `<tr><td colspan="9" class="empty-state"><i class="fas fa-exclamation-triangle"></i> Error: ${escapeHtml(error.message)}</td></tr>`;
            }
        }

        // ── CALCULATE LATE FEES ──
        async function calculateLateFees() {
            if (!confirm('This will calculate late fees for all pending penalties.\n\nContinue?')) return;

            const btn = document.querySelector('[onclick="calculateLateFees()"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calculating...';

            try {
                const { data, error } = await supabaseClient
                    .rpc('update_all_late_fees');

                if (error) throw error;

                const result = data || { updated_count: 0, total_late_fee_collected: 0 };
                alert(
                    `✅ Late fees updated!\n\n✅ Updated: ${result.updated_count || 0} penalties\n💰 Total late fees: KSh ${(result.total_late_fee_collected || 0).toFixed(2)}`);
                await loadLateFees();

            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-calculator"></i> Calculate';
            }
        }

        // ── UPDATE ALL LATE FEES ──
        async function updateAllLateFees() {
            if (!confirm('This will update all pending penalties with late fees based on current date.\n\nContinue?')) return;

            const btn = document.querySelector('[onclick="updateAllLateFees()"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const { data, error } = await supabaseClient
                    .rpc('update_all_late_fees');

                if (error) throw error;

                await loadLateFees();
                alert('✅ Late fees updated!');

            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync"></i> Update All';
            }
        }

        // ── EXPORT CSV ──
        async function exportCSV() {
            const filtered = currentFilter === 'all' ? allPenalties :
                allPenalties.filter(p => p.status === currentFilter);

            if (!filtered || filtered.length === 0) {
                alert('No penalties to export with current filter.');
                return;
            }

            let csv = '#,Member,Voice Part,Type,Original Amount,Days Late,Late Fee,Total Due,Status\n';
            filtered.forEach((p, i) => {
                const original = p.original_amount || p.amount || 0;
                const lateFee = p.late_fee_amount || 0;
                const total = p.total_with_late_fee || original + lateFee;
                const memberName = p.members?.name || p.member_name || 'Unknown';
                const voicePart = p.members?.voice_part || p.voice_part || '—';
                csv +=
                    `${i+1},"${memberName}","${voicePart}",${p.penalty_type},${original},${p.late_fee_days || 0},${lateFee},${total},${p.status}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download =
                `late_fees_${currentFilter}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ── EXPORT PDF ──
        async function exportPDF() {
            const filtered = currentFilter === 'all' ? allPenalties :
                allPenalties.filter(p => p.status === currentFilter);

            if (!filtered || filtered.length === 0) {
                alert('No penalties to export with current filter.');
                return;
            }

            const btn = document.querySelector('[onclick="exportPDF()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
            btn.disabled = true;

            let tableRows = '';
            filtered.forEach((p, i) => {
                const original = p.original_amount || p.amount || 0;
                const lateFee = p.late_fee_amount || 0;
                const total = p.total_with_late_fee || original + lateFee;
                const isPending = p.status === 'pending';
                const isLate = isPending && (p.late_fee_days || 0) > 0;
                const statusLabel = p.status === 'paid' ? 'Paid' :
                    isLate ? '⚠️ Late' : 'Pending';
                const typeLabel = p.penalty_type === 'late' ? '⏰ Late' : 
                                  p.penalty_type === 'custom' ? '📌 Custom' : '❌ Absent';
                const memberName = p.members?.name || p.member_name || 'Unknown';
                const voicePart = p.members?.voice_part || p.voice_part || '—';

                tableRows += `
                    <tr style="border-bottom: 1px solid #e2e8f0;">
                        <td style="padding: 8px 10px; text-align: center;">${i + 1}</td>
                        <td style="padding: 8px 10px;">${memberName}</td>
                        <td style="padding: 8px 10px;">${voicePart}</td>
                        <td style="padding: 8px 10px;">${typeLabel}</td>
                        <td style="padding: 8px 10px; text-align: right;">KSh ${original.toFixed(2)}</td>
                        <td style="padding: 8px 10px; text-align: center;">${p.late_fee_days || 0}</td>
                        <td style="padding: 8px 10px; text-align: right;">${lateFee > 0 ? `KSh ${lateFee.toFixed(2)}` : '—'}</td>
                        <td style="padding: 8px 10px; text-align: right; font-weight: 700; color: ${isPending ? '#dc2626' : '#10b981'};">KSh ${total.toFixed(2)}</td>
                        <td style="padding: 8px 10px; text-align: center;">${statusLabel}</td>
                    </tr>
                `;
            });

            const filterLabel = currentFilter === 'all' ? 'All' :
                currentFilter === 'pending' ? 'Pending Only' : 'Paid Only';

            const totalOriginal = filtered.reduce((s, p) => s + (p.original_amount || p.amount || 0), 0);
            const totalLateFeesSum = filtered.reduce((s, p) => s + (p.late_fee_amount || 0), 0);
            const totalDueSum = filtered.reduce((s, p) => s + (p.total_with_late_fee || p.amount || 0), 0);

            const pdfContent = document.createElement('div');
            pdfContent.style.padding = '30px';
            pdfContent.style.fontFamily = 'Arial, sans-serif';
            pdfContent.style.backgroundColor = 'white';
            pdfContent.style.color = '#1a1a2e';

            pdfContent.innerHTML = `
                <div style="text-align: center; margin-bottom: 24px; border-bottom: 2px solid #4f46e5; padding-bottom: 16px;">
                    <h1 style="color: #4f46e5; font-size: 24px; margin-bottom: 4px;">🎵 University of Embu Students' Choir</h1>
                    <h2 style="color: #1a1f36; font-size: 20px;">Late Fee Report</h2>
                    <p style="color: #64748b; font-size: 13px; margin-top: 4px;">
                        ${filterLabel} · Generated on ${new Date().toLocaleString()}
                    </p>
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #64748b; text-transform: uppercase;">Total Penalties</div>
                        <div style="font-size: 22px; font-weight: 700; color: #4f46e5;">${filtered.length}</div>
                    </div>
                    <div style="background: #fee2e2; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #64748b; text-transform: uppercase;">Total Late Fees</div>
                        <div style="font-size: 22px; font-weight: 700; color: #dc2626;">KSh ${totalLateFeesSum.toFixed(2)}</div>
                    </div>
                    <div style="background: #d1fae5; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #64748b; text-transform: uppercase;">Total Due</div>
                        <div style="font-size: 22px; font-weight: 700; color: #065f46;">KSh ${totalDueSum.toFixed(2)}</div>
                    </div>
                    <div style="background: #fef3c7; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #64748b; text-transform: uppercase;">Original Total</div>
                        <div style="font-size: 22px; font-weight: 700; color: #92400e;">KSh ${totalOriginal.toFixed(2)}</div>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                    <thead>
                        <tr style="background: #1a1f36; color: white;">
                            <th style="padding: 8px 10px; text-align: center;">#</th>
                            <th style="padding: 8px 10px; text-align: left;">Member</th>
                            <th style="padding: 8px 10px; text-align: left;">Voice</th>
                            <th style="padding: 8px 10px; text-align: center;">Type</th>
                            <th style="padding: 8px 10px; text-align: right;">Original</th>
                            <th style="padding: 8px 10px; text-align: center;">Days Late</th>
                            <th style="padding: 8px 10px; text-align: right;">Late Fee</th>
                            <th style="padding: 8px 10px; text-align: right;">Total Due</th>
                            <th style="padding: 8px 10px; text-align: center;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>

                <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 2px solid #e2e8f0; font-size: 11px; color: #94a3b8;">
                    <p>University of Embu Students' Choir · 98th Music Festival 2026</p>
                    <p>Report generated on ${new Date().toLocaleString()}</p>
                </div>
            `;

            try {
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `late_fees_${currentFilter}_${new Date().toISOString().split('T')[0]}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
                };

                await html2pdf().set(opt).from(pdfContent).save();

            } catch (error) {
                alert('❌ Error generating PDF: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ── INIT ──
        loadLateFees();

        window.loadLateFees = loadLateFees;
        window.calculateLateFees = calculateLateFees;
        window.updateAllLateFees = updateAllLateFees;
        window.exportCSV = exportCSV;
        window.exportPDF = exportPDF;
        window.setFilter = setFilter;
    </script>
</body>
</html>
