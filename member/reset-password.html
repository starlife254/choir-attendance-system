<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reset Password | Member Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- In ALL HTML files, use this -->
<script src="/cache-helper.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo .emoji { font-size: 48px; margin-bottom: 8px; }
        .logo h1 { color: #333; font-size: 22px; }
        .logo p { color: #666; font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #667eea; }
        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reset-btn:active { transform: scale(0.98); }
        .reset-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 18px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; }
        .message.success { display: block; background: #d1fae5; color: #065f46; }
        .message.info { display: block; background: #e0f2fe; color: #0369a1; }
        .login-link { text-align: center; margin-top: 18px; font-size: 14px; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
        .info-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #166534;
            text-align: center;
        }
        .info-box i { font-size: 18px; display: block; margin-bottom: 5px; }
        @media (max-width: 480px) { .container { padding: 25px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="emoji">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter your email and choose a new password</p>
        </div>

        <div id="message" class="message"></div>

        <div class="info-box">
            <i>💡</i>
            Enter your registered email and create a new password.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email address">
            </div>
            <div class="form-group">
                <label>🔒 New Password</label>
                <input type="password" id="newPassword" required placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>✓ Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter your password">
            </div>
            <button type="submit" class="reset-btn">🔑 Update Password</button>
        </form>

        <div class="login-link">
            Remembered your password? <a href="../login.html">Login here</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://skrvassehezrynudbahn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrcnZhc3NlaGV6cnludWRiYWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzUyMzAsImV4cCI6MjA5MjExMTIzMH0.iA93tmu9TCdmEhUxBLGRUE0fRdDha9-WPps8qNzd5a0';
        
        // SERVICE ROLE KEY - Use this to update passwords directly
        const SUPABASE_SERVICE_ROLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrcnZhc3NlaGV6cnludWRiYWhuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjUzNTIzMCwiZXhwIjoyMDkyMTExMjMwfQ.pi_FYbGS63x2vHm4L_yaffuuSL3ofDm7xZKxABVguFQ';
        
        // Create admin client with service role key
        const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE);
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.style.display = 'none';
            
            // Validate
            if (password !== confirmPassword) {
                showMessage('❌ Passwords do not match!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('❌ Password must be at least 6 characters', 'error');
                return;
            }
            
            const submitBtn = document.querySelector('.reset-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Processing...';
            submitBtn.disabled = true;
            
            try {
                // Step 1: Check if email exists in members table
                showMessage('🔍 Verifying your email...', 'info');
                
                const { data: member, error: memberError } = await supabaseClient
                    .from('members')
                    .select('member_id, name, email')
                    .eq('email', email)
                    .single();
                
                if (memberError || !member) {
                    showMessage('❌ Email not found in choir records. Please contact the choir administrator.', 'error');
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // Step 2: Find the user by email using admin API
                showMessage('🔍 Finding your account...', 'info');
                
                const { data: users, error: usersError } = await supabaseAdmin.auth.admin.listUsers();
                
                if (usersError) {
                    console.error('List users error:', usersError);
                    showMessage('❌ Error finding account. Please try again.', 'error');
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                const targetUser = users?.users?.find(u => u.email === email);
                
                if (!targetUser) {
                    showMessage('❌ No user account found for this email. Please register first.', 'error');
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // Step 3: Update password via Supabase Admin API
                showMessage('📧 Updating your password...', 'info');
                
                const { error: updateError } = await supabaseAdmin.auth.admin.updateUserById(
                    targetUser.id,
                    { password: password }
                );
                
                if (updateError) throw updateError;
                
                // Step 4: Update members table with password status
                await supabaseClient
                    .from('members')
                    .update({ 
                        password_set: true,
                        password_updated_at: new Date()
                    })
                    .eq('member_id', member.member_id);
                
                showMessage(`✅ Password updated successfully! Redirecting to login...`, 'success');
                
                setTimeout(() => {
                    window.location.href = '../login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Reset error:', error);
                if (error.message.includes('Database error')) {
                    showMessage('❌ Database error. Please try again.', 'error');
                } else if (error.message.includes('permission denied')) {
                    showMessage('❌ Permission denied. Please check the service role key.', 'error');
                } else {
                    showMessage('❌ Error resetting password: ' + error.message, 'error');
                }
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
